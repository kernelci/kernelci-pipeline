name: Validate KernelCI dashboard

on:
  schedule:
    # Run daily at 06:00 UTC.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: Number of recent days to validate
        required: false
        default: '1'

permissions:
  contents: read

concurrency:
  group: validate-kernelci-dashboard
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: builds
            args: builds --all-checkouts
          - name: boots
            args: boots --all-checkouts
          - name: builds-history
            args: builds --history --all-checkouts

    steps:
      - name: Check out source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install kci-dev
        run: |
          python -m pip install --upgrade pip
          # TODO: switch to the released kci-dev package after kernelci/kci-dev#275 lands.
          python -m pip install 'kci-dev @ git+https://github.com/nuclearcat/kci-dev.git@maestro-validate-json'

      - name: Show kci-dev version
        run: kci-dev --version

      - name: Validate ${{ matrix.name }}
        env:
          KCI_VALIDATE_DAYS: ${{ github.event.inputs.days || '1' }}
        run: |
          set -o pipefail
          kci-dev \
            --settings tools/cron/kci-dev.toml \
            maestro validate ${{ matrix.args }} \
            --days "${KCI_VALIDATE_DAYS}" \
            --json \
            --fail-on-mismatch \
            | tee "${RUNNER_TEMP}/${{ matrix.name }}.json"
