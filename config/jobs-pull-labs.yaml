_anchors:
  baseline-job-pull-labs: &baseline-job-pull-labs
    template: baseline.jinja2
    kind: job
    priority: medium
    kcidb_test_suite: boot
    params:
      ramdisk: 'http://storage.kernelci.org/images/rootfs/buildroot/buildroot-baseline/20260721.0/{brarch}/rootfs.cpio.gz'

  ltp-params-pull-labs: &ltp-params-pull-labs
    boot_commands: nfs
    nfsroot: 'https://storage.kernelci.org/images/rootfs/debian/trixie-ltp/20251201.0/{debarch}'
    skip_install: "true"
    skipfile: skipfile-lkft.yaml
    workers: max

  kselftest-params-pull-labs: &kselftest-params-pull-labs
    boot_commands: nfs
    nfsroot: 'https://storage.kernelci.org/images/rootfs/debian/trixie-kselftest/20260606.0/{debarch}'
    job_timeout: 30

jobs:
  baseline-arm-pull-labs-demo: *baseline-job-pull-labs
  baseline-arm-pull-pengutronix: *baseline-job-pull-labs
  baseline-arm64-pull-labs-demo: *baseline-job-pull-labs
  baseline-x86-pull-labs-demo: *baseline-job-pull-labs

  ltp-smoke-pull-labs:
    template: ltp-pull-labs.jinja2
    kind: job
    params:
      <<: *ltp-params-pull-labs
      tst_cmdfiles: "smoketest"
    kcidb_test_suite: ltp

  kselftest-arm64-pull-labs:
    template: kselftest-pull-labs.jinja2
    kind: job
    params:
      <<: *kselftest-params-pull-labs
      collection: arm64
    kcidb_test_suite: kselftest.arm64

  kselftest-breakpoints-pull-labs:
    template: kselftest-pull-labs.jinja2
    kind: job
    params:
      <<: *kselftest-params-pull-labs
      collection: breakpoints
    kcidb_test_suite: kselftest.breakpoints

  baseline-x86-aws-ec2:
    template: baseline.jinja2
    kind: job
    priority: medium
    kcidb_test_suite: boot

  baseline-arm64-aws-ec2:
    template: baseline.jinja2
    kind: job
    priority: medium
    kcidb_test_suite: boot

  ltp-smoke-aws-ec2:
    template: ltp-pull-labs.jinja2
    kind: job
    params:
      <<: *ltp-params-pull-labs
      tst_cmdfiles: "smoketest"
    kcidb_test_suite: ltp
