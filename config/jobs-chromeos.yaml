_anchors:
  kbuild-clang-21-chromeos:
    params: &kbuild-clang-21-chromeos-params
      compiler: clang-21
      defconfig: 'cros://chromeos-{krev}/{crosarch}/chromiumos-{flavour}.flavour.config'
      flavour: '{crosarch}-generic'
      kselftest: disable
      frequency: 1d

  kbuild-clang-21-arm64-chromeos: &kbuild-clang-21-arm64-chromeos-job
    template: kbuild.jinja2
    kind: kbuild
    image: ghcr.io/kernelci/{image_prefix}clang-21:arm64-kselftest-kernelci
    params: &kbuild-clang-21-arm64-chromeos-params
      <<: *kbuild-clang-21-chromeos-params
      arch: arm64
      cross_compile: 'aarch64-linux-gnu-'
      fragments:
        - lab-setup
        - arm64-chromebook
        - CONFIG_MODULE_COMPRESS=n
        - CONFIG_MODULE_COMPRESS_NONE=y
    rules: &kbuild-clang-21-arm64-chromeos-rules
      tree:
      - chromiumos

  kbuild-clang-21-x86-chromeos: &kbuild-clang-21-x86-chromeos-job
    <<: *kbuild-clang-21-arm64-chromeos-job
    image: ghcr.io/kernelci/{image_prefix}clang-21:x86-kselftest-kernelci
    params: &kbuild-clang-21-x86-chromeos-params
      <<: *kbuild-clang-21-chromeos-params
      arch: x86_64
      fragments:
        - lab-setup
        - x86-board
        - CONFIG_MODULE_COMPRESS=n
        - CONFIG_MODULE_COMPRESS_NONE=y
    rules: &kbuild-clang-21-x86-chromeos-rules
      <<: *kbuild-clang-21-arm64-chromeos-rules

  kbuild-gcc-14-arm64-chromeos: &kbuild-gcc-14-arm64-chromeos-job
    template: kbuild.jinja2
    kind: kbuild
    image: ghcr.io/kernelci/{image_prefix}gcc-14:arm64-kselftest-kernelci
    params: &kbuild-gcc-14-arm64-chromeos-params
      arch: arm64
      compiler: gcc-14
      cross_compile: 'aarch64-linux-gnu-'
      cross_compile_compat: 'arm-linux-gnueabihf-'
      defconfig: 'cros://chromeos-{krev}/{crosarch}/chromiumos-{flavour}.flavour.config'
      flavour: '{crosarch}-generic'
      fragments:
        - lab-setup
        - arm64-chromebook
        - CONFIG_MODULE_COMPRESS=n
        - CONFIG_MODULE_COMPRESS_NONE=y
    rules: &kbuild-gcc-14-arm64-chromeos-rules
      tree:
      - '!android'
      - '!chromiumos'
      - '!cip'
      - '!omap'

  kbuild-gcc-14-x86-chromeos: &kbuild-gcc-14-x86-chromeos-job
    <<: *kbuild-gcc-14-arm64-chromeos-job
    image: ghcr.io/kernelci/{image_prefix}gcc-14:x86-kselftest-kernelci
    params: &kbuild-gcc-14-x86-chromeos-params
      arch: x86_64
      compiler: gcc-14
      defconfig: 'cros://chromeos-{krev}/{crosarch}/chromeos-{flavour}.flavour.config'
      flavour: '{crosarch}-generic'
      fragments:
        - lab-setup
        - x86-board
        - CONFIG_MODULE_COMPRESS=n
        - CONFIG_MODULE_COMPRESS_NONE=y
    rules: &kbuild-gcc-14-x86-chromeos-rules
      tree:
      - '!android'
      - '!chromiumos'
      - '!cip'

  min-5_4-rules: &min-5_4-rules
    min_version:
      version: 5
      patchlevel: 4

  min-6_7-rules: &min-6_7-rules
    min_version:
      version: 6
      patchlevel: 7

  max-6_6-rules: &max-6_6-rules
    <<: *min-5_4-rules
    max_version:
      version: 6
      patchlevel: 6

  baseline-cros-kernel: &baseline-cros-kernel-job
    template: baseline.jinja2
    kind: job
    kcidb_test_suite: boot
    params: &baseline-cros-kernel-params
      extra_kernel_args: "lsm=capability,landlock,yama,safesetid,selinux,bpf"
    rules:
      tree:
        - chromiumos

  baseline-nfs-cros-kernel: &baseline-nfs-cros-kernel-job
    <<: *baseline-cros-kernel-job
    kcidb_test_suite: boot.nfs
    params:
      <<: *baseline-cros-kernel-params
      boot_commands: nfs
      nfsroot: http://storage.kernelci.org/images/rootfs/debian/bookworm/20240313.0/{debarch}
    rules:
      tree:
        - chromiumos

  kselftest: &kselftest-job
    template: generic.jinja2
    kind: job
    params: &kselftest-params
      test_method: kselftest
      boot_commands: nfs
      nfsroot: 'https://storage.kernelci.org/images/rootfs/debian/bookworm-kselftest/20250724.0/{debarch}'
      job_timeout: 10
    kcidb_test_suite: kselftest
    rules:
      tree:
        - collabora-next:for-kernelci

  kselftest-cros-kernel: &kselftest-cros-kernel-job
    <<: *kselftest-job
    params: &kselftest-cros-kernel-params
      <<: *kselftest-params
      extra_kernel_args: "lsm=capability,landlock,yama,safesetid,selinux,bpf"
    rules: &kselftest-cros-kernel-rules
      tree:
        - chromiumos

  ltp-cros-kernel: &ltp-cros-kernel-job
    template: ltp.jinja2
    kind: job
    params: &ltp-cros-kernel-params
      boot_commands: nfs
      nfsroot: 'https://storage.kernelci.org/images/rootfs/debian/bookworm-ltp/20250818.0/{debarch}'
      skip_install: "true"
      skipfile: skipfile-lkft.yaml
      extra_kernel_args: "lsm=capability,landlock,yama,safesetid,selinux,bpf"
    kcidb_test_suite: ltp
    rules: &ltp-cros-kernel-rules
      tree:
        - chromiumos

  fluster-debian: &fluster-debian-job
    template: 'generic.jinja2'
    kind: job
    params: &fluster-debian-params
      test_method: fluster-debian
      boot_commands: nfs
      nfsroot: 'https://storage.kernelci.org/images/rootfs/debian/bookworm-gst-fluster/20240926.0/{debarch}/'
      job_timeout: 30
      videodec_parallel_jobs: 1
      videodec_timeout: 90
    rules:
      tree:
        - mainline
        - next
        - collabora-chromeos-kernel

  fault-injection-cros-kernel: &fault-injection-cros-kernel-job
    template: generic.jinja2
    kind: job
    params: &fault-injection-cros-kernel-job-params
      test_method: fault-injection
      test_name: suspend-resume
      test_command: 'rtcwake -m mem -s 15'
      boot_commands: nfs
      nfsroot: 'https://storage.kernelci.org/images/rootfs/debian/bookworm-fault-injection/20250520.0/{debarch}/'
      extra_kernel_args: "lsm=capability,landlock,yama,safesetid,selinux,bpf"
    rules:
      tree:
        - chromiumos
      min_version:
        version: 5
        patchlevel: 15
    kcidb_test_suite: kernelci_fault_injection

  blktests: &blktests-job
    template: generic.jinja2
    kind: job
    params: &blktests-job-params
      test_method: blktests
      boot_commands: nfs
      nfsroot: 'https://storage.kernelci.org/images/rootfs/debian/bookworm-blktest/20251016.0/amd64/'
    kcidb_test_suite: kernelci_blktests

  blktests-cros-kernel: &blktests-cros-kernel-job
    <<: *blktests-job
    params: &blktests-cros-kernel-params
      <<: *blktests-job-params
      extra_kernel_args: "lsm=capability,landlock,yama,safesetid,selinux,bpf"
    rules:
      tree:
        - chromiumos

  ltp-fault-injection-cros-kernel: &ltp-fault-injection-cros-kernel-job
    <<: *ltp-cros-kernel-job
    params: &ltp-fault-injection-cros-kernel-params
      <<: *ltp-cros-kernel-params
      # Uncomment the following line to set a fixed probability value for fault injection,
      # otherwise a random value between 1 and 100 will be set in ltp.jinja2
      # extra_kirk_args: "-F 50"
    kcidb_test_suite: ltp_fault_injection
    rules: &ltp-fault-injection-cros-kernel-rules
      <<: *ltp-cros-kernel-rules
      min_version:
        version: 5
        patchlevel: 15

  watchdog-reset: &watchdog-reset-job
    template: generic.jinja2
    kind: job
    params: &watchdog-reset-job-params
      test_method: watchdog-reset
      bl_message: 'coreboot-'
      wdt_dev: 'watchdog0'
    rules:
      tree:
        - mainline
        - stable-rc
        - stable
    kcidb_test_suite: kernelci_watchdog_reset

  wifi-basic: &wifi-basic-job
    template: generic.jinja2
    kind: job
    params: &wifi-basic-job-params
      test_method: wifi-basic
      boot_commands: nfs
      nfsroot: 'https://storage.kernelci.org/images/rootfs/debian/bookworm-wifi/20250925.0/{debarch}/'
    rules:
      tree:
        - mainline
        - stable-rc
        - stable
    kcidb_test_suite: kernelci_wifi_basic

  wifi-basic-cros-kernel: &wifi-basic-cros-kernel-job
    <<: *wifi-basic-job
    params:
      <<: *wifi-basic-job-params
      extra_kernel_args: "lsm=capability,landlock,yama,safesetid,selinux,bpf"
    rules:
      tree:
        - chromiumos

jobs:

  baseline-arm64-mediatek-chromebook: &baseline-job
    template: baseline.jinja2
    kind: job
    kcidb_test_suite: boot
    rules:
      tree:
        - mainline
        - stable-rc
        - stable

  baseline-arm64-qualcomm-chromebook: *baseline-job

  baseline-nfs-arm64-mediatek-chromebook: &baseline-nfs-job
    template: baseline.jinja2
    kind: job
    params:
      boot_commands: nfs
      nfsroot: http://storage.kernelci.org/images/rootfs/debian/bookworm/20240313.0/{debarch}
    kcidb_test_suite: boot.nfs
    rules:
      tree:
        - mainline
        - stable-rc
        - stable

  baseline-nfs-arm64-qualcomm-chromebook: *baseline-nfs-job
  baseline-nfs-x86-amd-chromebook: *baseline-nfs-job
  baseline-nfs-x86-intel-chromebook: *baseline-nfs-job
  baseline-x86-amd-chromebook: *baseline-job
  baseline-x86-amd-staging-chromebook: *baseline-job
  baseline-x86-intel-chromebook: *baseline-job

  baseline-arm64-mediatek-cros-kernel: *baseline-cros-kernel-job
  baseline-arm64-qualcomm-cros-kernel: *baseline-cros-kernel-job
  baseline-x86-amd-cros-kernel: *baseline-cros-kernel-job
  baseline-x86-intel-cros-kernel: *baseline-cros-kernel-job

  baseline-nfs-arm64-mediatek-cros-kernel: *baseline-nfs-cros-kernel-job
  baseline-nfs-arm64-qualcomm-cros-kernel: *baseline-nfs-cros-kernel-job
  baseline-nfs-x86-amd-cros-kernel: *baseline-nfs-cros-kernel-job
  baseline-nfs-x86-intel-cros-kernel: *baseline-nfs-cros-kernel-job

  fault-injection-x86-intel-cros-kernel: *fault-injection-cros-kernel-job
  ltp-fault-injection-x86-intel-cros-kernel: *ltp-fault-injection-cros-kernel-job

  kbuild-clang-21-arm64-chromeos-daily-mediatek:
    <<: *kbuild-clang-21-arm64-chromeos-job
    params:
      <<: *kbuild-clang-21-arm64-chromeos-params
      flavour: mediatek
    rules:
      <<: *kbuild-clang-21-arm64-chromeos-rules
      branch:
        - '!chromiumos:chromeos-5.4'
        - '!chromiumos:chromeos-6.6'

  kbuild-clang-21-arm64-chromeos-daily-qualcomm:
    <<: *kbuild-clang-21-arm64-chromeos-job
    params:
      <<: *kbuild-clang-21-arm64-chromeos-params
      flavour: qualcomm
    rules:
      <<: *kbuild-clang-21-arm64-chromeos-rules
      branch:
        - 'chromeos-6.6'
        - 'chromeos-6.12'

  kbuild-clang-21-x86-chromeos-daily-amd:
    <<: *kbuild-clang-21-x86-chromeos-job
    params:
      <<: *kbuild-clang-21-x86-chromeos-params
      flavour: amd-stoneyridge
    rules:
      <<: *kbuild-clang-21-x86-chromeos-rules
      branch:
        - '!chromiumos:chromeos-5.15'
        - '!chromiumos:chromeos-6.1'

  kbuild-clang-21-x86-chromeos-daily-intel:
    <<: *kbuild-clang-21-x86-chromeos-job
    params:
      <<: *kbuild-clang-21-x86-chromeos-params
      flavour: intel-pineview

  kbuild-gcc-14-arm64-chromebook: &kbuild-gcc-14-arm64-chromebook-job
    <<: *kbuild-gcc-14-arm64-chromeos-job
    params:
      <<: *kbuild-gcc-14-arm64-chromeos-params
      cross_compile_compat:
      defconfig: defconfig
    rules:
      <<: *kbuild-gcc-14-arm64-chromeos-rules
      tree:
        - '!android'
        - '!chromiumos'
        - '!cip'
        - '!media-committers'
        - '!cip'

  kbuild-gcc-14-arm64-chromebook-media-committers:
    <<: *kbuild-gcc-14-arm64-chromebook-job
    # Don't copy parent Job rules because they would get overwritten anyway
    rules:
      tree:
        - 'media-committers'

  kbuild-gcc-14-arm64-chromeos-mediatek:
    <<: *kbuild-gcc-14-arm64-chromeos-job
    params: &kbuild-gcc-14-arm64-chromeos-mediatek-params
      <<: *kbuild-gcc-14-arm64-chromeos-params
      flavour: mediatek
    rules:
      <<: *kbuild-gcc-14-arm64-chromeos-rules
      min_version:
        version: 6
        patchlevel: 1
      tree:
        - '!cip'

  kbuild-gcc-14-arm64-chromeos-mediatek-coverage:
    <<: *kbuild-gcc-14-arm64-chromeos-job
    params: &kbuild-gcc-14-arm64-chromeos-mediatek-coverage-params
      <<: *kbuild-gcc-14-arm64-chromeos-mediatek-params
      fragments:
        - arm64-chromebook
        - coverage
        - crypto
        - kselftest
        - lab-setup
        - CONFIG_MODULE_COMPRESS=n
        - CONFIG_MODULE_COMPRESS_NONE=y
    rules:
      <<: *kbuild-gcc-14-arm64-chromeos-rules
      min_version:
        version: 6
        patchlevel: 1
      tree:
        - chromiumos

  kbuild-gcc-14-arm64-chromeos-daily-mediatek:
    <<: *kbuild-gcc-14-arm64-chromeos-job
    params:
      <<: *kbuild-gcc-14-arm64-chromeos-mediatek-params
      frequency: 1d
    rules:
      <<: *kbuild-gcc-14-arm64-chromeos-rules
      tree:
        - 'chromiumos'
      branch:
        - '!chromiumos:chromeos-5.4'
        - '!chromiumos:chromeos-6.6'

  kbuild-gcc-14-arm64-chromeos-qualcomm:
    <<: *kbuild-gcc-14-arm64-chromeos-job
    params: &kbuild-gcc-14-arm64-chromeos-qualcomm-params
      <<: *kbuild-gcc-14-arm64-chromeos-params
      flavour: qualcomm
    rules:
      tree:
        - '!cip'

  kbuild-gcc-14-arm64-chromeos-qualcomm-coverage:
    <<: *kbuild-gcc-14-arm64-chromeos-job
    params:
      <<: *kbuild-gcc-14-arm64-chromeos-mediatek-coverage-params
      flavour: qualcomm
    rules:
      <<: *kbuild-gcc-14-arm64-chromeos-rules
      tree:
        - 'chromiumos'

  kbuild-gcc-14-arm64-chromeos-daily-qualcomm:
    <<: *kbuild-gcc-14-arm64-chromeos-job
    params:
      <<: *kbuild-gcc-14-arm64-chromeos-qualcomm-params
      frequency: 1d
    rules:
      <<: *kbuild-gcc-14-arm64-chromeos-rules
      tree:
        - 'chromiumos'
      branch:
        - 'chromiumos:chromeos-6.6'

  kbuild-gcc-14-x86-chromeos-amd:
    <<: *kbuild-gcc-14-x86-chromeos-job
    params: &kbuild-gcc-14-x86-chromeos-amd-params
      <<: *kbuild-gcc-14-x86-chromeos-params
      flavour: amd-stoneyridge
    rules:
      tree:
        - '!cip'

  kbuild-gcc-14-x86-chromeos-amd-coverage:
    <<: *kbuild-gcc-14-x86-chromeos-job
    params: &kbuild-gcc-14-x86-chromeos-amd-coverage-params
      <<: *kbuild-gcc-14-x86-chromeos-params
      flavour: amd-stoneyridge
      fragments:
        - coverage
        - crypto
        - kselftest
        - lab-setup
        - x86-board
        - CONFIG_MODULE_COMPRESS=n
        - CONFIG_MODULE_COMPRESS_NONE=y
    rules:
      <<: *kbuild-gcc-14-x86-chromeos-rules
      tree:
        - 'chromiumos'

  kbuild-gcc-14-x86-chromeos-daily-amd:
    <<: *kbuild-gcc-14-x86-chromeos-job
    params:
      <<: *kbuild-gcc-14-x86-chromeos-amd-params
      frequency: 1d
    rules:
      <<: *kbuild-gcc-14-x86-chromeos-rules
      tree:
        - 'chromiumos'
      branch:
        - '!chromiumos:chromeos-5.15'
        - '!chromiumos:chromeos-6.1'

  kbuild-gcc-14-x86-chromeos-intel:
    <<: *kbuild-gcc-14-x86-chromeos-job
    params: &kbuild-gcc-14-x86-chromeos-intel-params
      <<: *kbuild-gcc-14-x86-chromeos-params
      flavour: intel-pineview
    rules:
      tree:
        - '!cip'

  kbuild-gcc-14-x86-chromeos-intel-coverage:
    <<: *kbuild-gcc-14-x86-chromeos-job
    params:
      <<: *kbuild-gcc-14-x86-chromeos-amd-coverage-params
      flavour: intel-pineview
    rules:
      <<: *kbuild-gcc-14-x86-chromeos-rules
      tree:
        - 'chromiumos'

  kbuild-gcc-14-x86-chromeos-daily-intel:
    <<: *kbuild-gcc-14-x86-chromeos-job
    params:
      <<: *kbuild-gcc-14-x86-chromeos-intel-params
      frequency: 1d
    rules:
      <<: *kbuild-gcc-14-x86-chromeos-rules
      tree:
        - 'chromiumos'

  kbuild-gcc-14-x86-chromeos-daily-intel-fault-injection:
    <<: *kbuild-gcc-14-x86-chromeos-job
    params:
      <<: *kbuild-gcc-14-x86-chromeos-intel-params
      frequency: 1d
      fragments:
        - lab-setup
        - x86-board
        - fault-injection
        - CONFIG_MODULE_COMPRESS=n
        - CONFIG_MODULE_COMPRESS_NONE=y
    rules:
      <<: *kbuild-gcc-14-x86-chromeos-rules
      tree:
        - 'chromiumos'
      branch:
        - 'chromiumos:chromeos-5.15'
        - 'chromiumos:chromeos-6.1'
        - 'chromiumos:chromeos-6.6'

  kselftest-acpi:
    <<: *kselftest-job
    params:
      <<: *kselftest-params
      collections: acpi
    kcidb_test_suite: kselftest.acpi

  kselftest-cros-kernel-alsa:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: alsa
    kcidb_test_suite: kselftest.alsa

  kselftest-cros-kernel-arm64:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: arm64
    kcidb_test_suite: kselftest.arm64

  kselftest-cros-kernel-capabilities:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: capabilities
    kcidb_test_suite: kselftest.capabilities

  kselftest-cros-kernel-clone3:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: clone3
    kcidb_test_suite: kselftest.clone3

  kselftest-cros-kernel-cpufreq:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: cpufreq
    kcidb_test_suite: kselftest.cpufreq

  kselftest-cros-kernel-cpufreq-suspend:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: cpufreq
      env: 'KSELFTEST_MAIN_SH_ARGS="-t suspend_rtc"'
    rules:
      <<: *kselftest-cros-kernel-rules
      min_version:
        version: 6
        patchlevel: 12
    kcidb_test_suite: kselftest.cpufreq.suspend

  kselftest-cros-kernel-dmabuf-heaps:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: dmabuf-heaps
    kcidb_test_suite: kselftest.dmabuf-heaps

  kselftest-cros-kernel-dt:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: dt
    rules:
      <<: *kselftest-cros-kernel-rules
      min_version:
        version: 6
        patchlevel: 7
    kcidb_test_suite: kselftest.dt

  kselftest-cros-kernel-exec:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: exec
    kcidb_test_suite: kselftest.exec

  kselftest-cros-kernel-ftrace:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: ftrace
    kcidb_test_suite: kselftest.ftrace

  kselftest-cros-kernel-futex:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: futex
    kcidb_test_suite: kselftest.futex

  kselftest-cros-kernel-kcmp:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: kcmp
    kcidb_test_suite: kselftest.kcmp

  kselftest-cros-kernel-kvm:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: kvm
    kcidb_test_suite: kselftest.kvm

  kselftest-cros-kernel-landlock:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: landlock
    kcidb_test_suite: kselftest.landlock

  kselftest-cros-kernel-lsm:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: lsm
    kcidb_test_suite: kselftest.lsm

  kselftest-cros-kernel-memfd:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: memfd
    kcidb_test_suite: kselftest.memfd

  kselftest-cros-kernel-net:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: net
      job_timeout: 300
      skipfile: https://storage.kernelci.org/skipfile-net.yaml
    kcidb_test_suite: kselftest.net

  kselftest-cros-kernel-perf-events:
    <<: *kselftest-cros-kernel-job
    params:
      <<: *kselftest-cros-kernel-params
      collections: perf_events
    kcidb_test_suite: kselftest.perf_events

