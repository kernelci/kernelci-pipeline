_anchors:
  node-event: &node-event-kbuild
    channel: node
    kind: kbuild
    state: available

scheduler:

  - job: baseline-arm-pull-labs-demo
    event: &kbuild-gcc-15-arm-node-event
      <<: *node-event-kbuild
      name: kbuild-gcc-15-arm
    runtime: &pull-labs-demo-runtime
      type: pull_labs
      name: pull-labs-demo
    platforms:
      - beaglebone-black
      - imx6dl-udoo

  - job: baseline-arm64-pull-labs-demo
    event: &kbuild-gcc-15-arm64-node-event
      <<: *node-event-kbuild
      name: kbuild-gcc-15-arm64
    runtime:
      type: pull_labs
      name: pull-labs-demo
    platforms:
      - bcm2711-rpi-4-b
      - cd8180-orion-o6
      - exynos850-e850-96
      - fvp-aemva
      - qemu-arm64

  - job: baseline-arm-pull-pengutronix
    event: *kbuild-gcc-15-arm-node-event
    runtime: &pull-pengutronix-runtime
      type: pull_labs
      name: pull-pengutronix
    platforms:
      - imx6dl-riotboard

  - job: ltp-smoke-pull-labs
    event: *kbuild-gcc-15-arm64-node-event
    runtime:
      type: pull_labs
      name: pull-labs-demo
    platforms:
      - bcm2711-rpi-4-b
      - exynos850-e850-96

  - job: ltp-smoke-pull-labs
    event:
      <<: *node-event-kbuild
      name: kbuild-gcc-15-arm64-nfsboot
    runtime:
      type: pull_labs
      name: pull-labs-demo
    platforms:
      - cd8180-orion-o6
      - qemu-arm64

  - job: kselftest-arm64-pull-labs
    event: *kbuild-gcc-15-arm64-node-event
    runtime:
      type: pull_labs
      name: pull-labs-demo
    platforms:
      - exynos850-e850-96

  - job: kselftest-arm64-pull-labs
    event:
      <<: *node-event-kbuild
      name: kbuild-gcc-15-arm64-nfsboot
    runtime:
      type: pull_labs
      name: pull-labs-demo
    platforms:
      - qemu-arm64
      - cd8180-orion-o6

  - job: kselftest-breakpoints-pull-labs
    event: *kbuild-gcc-15-arm64-node-event
    runtime:
      type: pull_labs
      name: pull-labs-demo
    platforms:
      - exynos850-e850-96

  - job: baseline-x86-pull-labs-demo
    event: &kbuild-gcc-15-x86-node-event
      <<: *node-event-kbuild
      name: kbuild-gcc-15-x86
    runtime:
      type: pull_labs
      name: pull-labs-demo
    platforms:
      - qemu-x86_64

  - job: baseline-x86-aws-ec2
    event: &kbuild-gcc-14-x86-aws-ec2-node-event
      <<: *node-event-kbuild
      name: kbuild-gcc-15-x86-aws-ec2
    runtime: &pull-labs-aws-ec2-runtime
      type: pull_labs
      name: pull-labs-aws-ec2
    platforms:
      - aws-ec2-x86_64

  - job: baseline-arm64-aws-ec2
    event: &kbuild-gcc-14-arm64-aws-ec2-node-event
      <<: *node-event-kbuild
      name: kbuild-gcc-15-arm64-aws-ec2
    runtime: *pull-labs-aws-ec2-runtime
    platforms:
      - aws-ec2-arm64

  - job: ltp-smoke-aws-ec2
    event: *kbuild-gcc-14-x86-aws-ec2-node-event
    runtime: *pull-labs-aws-ec2-runtime
    platforms:
      - aws-ec2-x86_64

  - job: ltp-smoke-aws-ec2
    event: *kbuild-gcc-14-arm64-aws-ec2-node-event
    runtime: *pull-labs-aws-ec2-runtime
    platforms:
      - aws-ec2-arm64
